#####################################################################
## Minimal single-node FE config for the doris-duckbridge compose.
## Cribbed from jvm/doris-ducklake/compose/fe.conf.
## Full config surface: fe/src/org/apache/doris/common/Config.java
#####################################################################

CUR_DATE=`date +%Y%m%d-%H%M%S`

# Log dir
LOG_DIR = ${DORIS_HOME}/log

# For jdk 17, this JAVA_OPTS is the default JVM options. Heap dropped to 2g (the upstream
# 8g default doesn't fit a typical Docker memory ceiling), and -XX:-UseContainerSupport
# because the base image's bundled JDK 17 NPEs during cgroup-v2 container-resource
# detection on native-Linux hosts (safe: heap is pinned -Xmx2g). start_fe.sh sources this
# file for JAVA_OPTS_FOR_JDK_17, so an env-var override does NOT work — must replace the file.
JAVA_OPTS_FOR_JDK_17="-Dfile.encoding=UTF-8 -Djavax.security.auth.useSubjectCredsOnly=false -XX:-UseContainerSupport -Xmx2g -Xms2g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=$LOG_DIR -Xlog:gc*:$LOG_DIR/fe.gc.log.$CUR_DATE:time,uptime:filecount=10,filesize=50M -Darrow.enable_null_check_for_get=false --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.invoke=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED --add-opens=java.base/java.io=ALL-UNNAMED --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=org.apache.arrow.memory.core,ALL-UNNAMED --add-opens=java.base/java.util=ALL-UNNAMED --add-opens=java.base/java.util.concurrent=ALL-UNNAMED --add-opens=java.base/java.util.concurrent.atomic=ALL-UNNAMED --add-opens=java.base/sun.nio.ch=ALL-UNNAMED --add-opens=java.base/sun.nio.cs=ALL-UNNAMED --add-opens=java.base/sun.security.action=ALL-UNNAMED --add-opens=java.base/sun.util.calendar=ALL-UNNAMED --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED --add-opens=java.management/sun.management=ALL-UNNAMED --add-opens=java.base/jdk.internal.ref=ALL-UNNAMED --add-opens=java.xml/com.sun.org.apache.xerces.internal.jaxp=ALL-UNNAMED"

##
## the lowercase properties are read by the main program.
##

http_port = 8030
rpc_port = 9020
query_port = 9030
edit_log_port = 9010
arrow_flight_sql_port = 8070

# priority_networks: init_fe.sh APPENDS this at every boot (see smoke.sh — the compose
# mounts a gitignored .fe.conf.runtime copy so those appends never pollute the tracked
# file). Left unset here; init derives it from the container's network.

sys_log_level = INFO
sys_log_mode = ASYNC

# Directory containing connector provider plugin subdirectories (singular `connector`).
# Each subdirectory is one connector (es/, jdbc/, iceberg/, duckbridge/, …). The
# duckbridge plugin is mounted at plugins/connector/duckbridge by compose (see
# docker-compose.yml + smoke.sh). Shown as the default; uncomment to override.
# connector_plugin_root = ${DORIS_HOME}/plugins/connector
